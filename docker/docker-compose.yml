services:
  andino_isaac:
    user: ${USERID}:${GROUPID}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: andino_isaac
    network_mode: host
    working_dir: /home/isaac-sim/ws/
    privileged: true
    environment:
      - LOCAL_UID=${LOCAL_UID}
      - LOCAL_GID=${LOCAL_GID}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-10}
      - DISPLAY
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
      - OMNI_KIT_ACCEPT_EULA=Y
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - NVIDIA_VISIBLE_DEVICES= all
      - NVIDIA_DRIVER_CAPABILITIES= all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth
      # Various Isaac directories
      - ./docker/isaac-sim/cache/main:/isaac-sim/.cache:rw \
      - ./docker/isaac-sim/cache/computecache:/isaac-sim/.nv/ComputeCache:rw \
      - ./docker/isaac-sim/logs:/isaac-sim/.nvidia-omniverse/logs:rw \
      - ./docker/isaac-sim/config:/isaac-sim/.nvidia-omniverse/config:rw \
      - ./docker/isaac-sim/data:/isaac-sim/.local/share/ov/data:rw \
      - ./docker/isaac-sim/pkg:/isaac-sim/.local/share/ov/pkg:rw \
      # Workspace
      - ..:/home/isaac-sim/ws/src/andino_isaac:rw
    devices:
      - /dev/dri:/dev/dri
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
